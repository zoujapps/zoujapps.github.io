<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title translate="no">ZoujApps - Innovative Mobile Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 10% 30%, #f8fafc, #eef2f8);
            min-height: 100vh;
            color: #0a2b3e;
        }
        .translate-container {
            position: fixed; top: 20px; right: 20px; z-index: 1100;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
            padding: 6px 16px; border-radius: 60px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5); font-size: 14px;
        }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0px !important; }
        .skiptranslate iframe { display: none !important; }
        .goog-te-gadget { color: transparent !important; }
        .goog-te-gadget .goog-te-combo { 
            padding: 6px 14px; border-radius: 40px;
            border: 1px solid #cbd5e1; background: white;
            font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
        }
        .hero {
            background: linear-gradient(125deg, #0b2f44 0%, #1b5379 100%);
            color: white; padding: 70px 24px 90px; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 92%, 0 100%); margin-bottom: -10px;
        }
        .hero h1 { font-size: 4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 20px; }
        .hero h1 span {
            background: linear-gradient(130deg, #FFE6B0, #FFB347);
            background-clip: text; -webkit-background-clip: text; color: transparent;
        }
        .hero p { font-size: 1.3rem; opacity: 0.92; max-width: 650px; margin: 0 auto; }
        .container { max-width: 1300px; margin: -30px auto 70px; padding: 0 24px; position: relative; z-index: 5; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 40px; margin-top: 20px; }
        .app-card {
            background: rgba(255,255,255,0.98); border-radius: 48px;
            box-shadow: 0 30px 45px -20px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden; backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer;
        }
        .app-card:hover { transform: translateY(-12px); box-shadow: 0 40px 60px -22px rgba(0,0,0,0.35); }
        .card-img {
            background: linear-gradient(135deg, #1e4e6e, #0c3146);
            padding: 45px 20px; text-align: center;
        }
        .card-img .app-icon { font-size: 5.5rem; filter: drop-shadow(0 12px 14px rgba(0,0,0,0.3)); }
        .card-content { padding: 32px 28px 36px; }
        .card-content h3 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: #0a2b3e; }
        .card-content .hook {
            font-size: 1rem;
            color: #FFB347;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .card-content p { color: #2c4b6e; line-height: 1.5; font-size: 0.95rem; margin-bottom: 20px; }
        .discover-btn {
            background: #0a2b3e; color: white; border: none; padding: 14px 0;
            width: 100%; border-radius: 50px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.25s; text-align: center;
            display: inline-block; text-decoration: none;
        }
        .discover-btn:hover { background: #1b5379; transform: scale(1.02); }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }
        .modal-content {
            background: white;
            max-width: 550px;
            width: 90%;
            border-radius: 48px;
            padding: 32px 28px;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 40px 70px rgba(0,0,0,0.4);
        }
        .modal-close {
            position: absolute;
            top: 20px; right: 24px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            color: #0a2b3e;
            transition: 0.2s;
        }
        .modal-close:hover { color: #FFB347; }
        .modal-icon { font-size: 4rem; text-align: center; margin-bottom: 12px; }
        .modal-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; text-align: center; }
        .modal-description { color: #2c4b6e; line-height: 1.6; margin: 20px 0; }
        .modal-features {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        .modal-feature {
            background: #eef3fc;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1b5379;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .modal-buttons .btn {
            flex: 1;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        footer {
            text-align: center; padding: 36px 24px; background: #0a2b3e;
            color: #b9d0e5; font-size: 0.85rem;
        }
        footer a { color: #FFD966; text-decoration: none; }
        @media (max-width: 700px) {
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1rem; }
            .apps-grid { grid-template-columns: 1fr; }
            .card-content h3 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="translate-container">
    <div id="google_translate_element"></div>
</div>

<section class="hero">
    <h1><span class="notranslate">Zouj<span>Apps</span></span></h1>
    <p>Innovative mobile tools that make everyday life simpler and smarter.</p>
</section>

<div class="container">
    <div class="apps-grid" id="appsGrid"></div>
</div>

<footer>
    <p>© 2026 <span class="notranslate">ZoujApps</span> — Clean, reliable, user‑first apps</p>
</footer>

<!-- Modal structure -->
<div id="appModal" class="modal">
    <div class="modal-content">
        <span class="modal-close">&times;</span>
        <div id="modalIcon" class="modal-icon"></div>
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalDescription" class="modal-description"></div>
        <div id="modalFeatures" class="modal-features"></div>
        <div id="modalButtons" class="modal-buttons"></div>
    </div>
</div>

<script>
    // App data (all in English)
    const apps = [
        {
            id: "expense",
            name: "Expense Monitor",
            icon: "💰📊",
            hook: "Smart daily loss tracker",
            shortDesc: "Log your expenses and get instant weekly, monthly & yearly summaries.",
            fullDesc: "Expense Monitor helps you take control of your daily spending. Record every expense with tags, view detailed charts, and get actionable insights. All data stays on your device – no internet required for core features.",
            features: ["📅 Daily tracking", "📊 Weekly & monthly summaries", "🌍 Multi-language support", "🔒 100% offline", "📈 Spending insights", "🗓️ Yearly reports"],
            downloadLink: "https://play.google.com/store/apps/details?id=com.zoujapps.expense_monitor",
            privacyLink: "expense-monitor-privacy.html"
        },
        {
            id: "driver",
            name: "Driver Assistant",
            icon: "🚗⚙️",
            hook: "Smart vehicle maintenance tracker",
            shortDesc: "Never miss an oil or filter change again.",
            fullDesc: "Driver Assistant keeps your car in perfect shape. Add multiple vehicles, set service intervals, and get smart reminders. The automatic odometer and maintenance log make car care effortless – fully offline.",
            features: ["📊 Multiple vehicles", "⏰ Smart reminders", "📈 Auto odometer", "🔒 100% offline", "🛢️ Oil & filter tracking", "📅 Service history"],
            downloadLink: "https://play.google.com/store/apps/details?id=com.zoujapps.driver_assistant",
            privacyLink: "https://zoujapps.github.io/privacy-driver-assistant.html"
        },
        {
            id: "profit",
            name: "Profit Track Pro",
            icon: "📈💼",
            hook: "Track profits & losses like a pro",
            shortDesc: "Complete financial diary with 10-year archive, 50+ currencies, 6 languages.",
            fullDesc: "Profit Track Pro is your ultimate financial companion. Record daily profits and losses, browse any month up to 10 years back, and get accurate summaries. Enjoy dark/light mode, a privacy mask for numbers, full backup/restore, and an interactive tutorial.",
            features: ["📆 10-year archive", "🌍 6 languages", "💱 50+ currencies", "🌙 Dark/Light mode", "👁️ Privacy mask", "💾 Backup & restore", "📊 Daily/Weekly/Monthly summaries", "📖 Interactive guide"],
            downloadLink: "https://play.google.com/store/apps/details?id=com.zoujapps.profit_track_pro",  // change when available
            privacyLink: "https://zoujapps.github.io/Profit-Track-Pro-privacy.html"
        }
    ];

    // Render cards
    const grid = document.getElementById("appsGrid");
    apps.forEach(app => {
        const card = document.createElement("div");
        card.className = "app-card";
        card.innerHTML = `
            <div class="card-img">
                <div class="app-icon">${app.icon}</div>
            </div>
            <div class="card-content">
                <h3>${app.name}</h3>
                <div class="hook">✨ ${app.hook}</div>
                <p>${app.shortDesc}</p>
                <button class="discover-btn" data-id="${app.id}">🔍 Discover App</button>
            </div>
        `;
        grid.appendChild(card);
    });

    // Modal elements
    const modal = document.getElementById("appModal");
    const closeModal = document.querySelector(".modal-close");
    const modalIcon = document.getElementById("modalIcon");
    const modalTitle = document.getElementById("modalTitle");
    const modalDescription = document.getElementById("modalDescription");
    const modalFeatures = document.getElementById("modalFeatures");
    const modalButtons = document.getElementById("modalButtons");

    function openModal(appId) {
        const app = apps.find(a => a.id === appId);
        if (!app) return;
        modalIcon.textContent = app.icon;
        modalTitle.textContent = app.name;
        modalDescription.textContent = app.fullDesc;
        // render feature tags
        modalFeatures.innerHTML = app.features.map(f => `<span class="modal-feature">${f}</span>`).join("");
        // render buttons
        modalButtons.innerHTML = `
            <a href="${app.downloadLink}" class="btn" target="_blank">📲 Download</a>
            <a href="${app.privacyLink}" class="btn btn-privacy" target="_blank">🔒 Privacy Policy</a>
        `;
        modal.style.display = "flex";
    }

    // Add event listeners to all discover buttons (after they are rendered)
    setTimeout(() => {
        document.querySelectorAll(".discover-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = btn.getAttribute("data-id");
                openModal(id);
            });
        });
    }, 0);

    closeModal.onclick = () => { modal.style.display = "none"; };
    window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
</script>

<script>
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'en',
            includedLanguages: 'ar,en,fr,es,pt',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
